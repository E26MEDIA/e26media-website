services:
  - type: web
    name: e26media-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DB_NAME
        value: e26media
      - key: CORS_ORIGINS
        value: https://www.e26media.com,https://e26media.com,https://frontend-eight-rho-vaj918k86r.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URL
        sync: false
